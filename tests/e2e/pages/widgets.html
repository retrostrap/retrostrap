<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retrostrap widgets</title>
<link rel="stylesheet" href="/dist/retrostrap.css">
</head>
<body data-rs-widgets="cursor-trail sparkle snowfall kugeln pixel-pet"
      data-rs-cursor-trail-variant="stars"
      data-rs-cursor-trail-count="10"
      data-rs-kugeln-count="7"
      data-rs-pixel-pet-name="Blobby"
      data-rs-sparkle-mode="both"
      data-rs-sparkle-zone="#zone"
      data-rs-snowfall-density="normal">
<div class="rs-page rs-container">
  <h1>Widget harness</h1>
  <div id="zone" style="block-size: 300px; border: 2px groove var(--rs-bevel-face);">
    <p>Ambient sparkle zone. Move the pointer for a trail and sparkles.</p>
  </div>
</div>
<script src="/dist/retrostrap.js"></script>
<script src="/dist/retrostrap-toybox.min.js"></script>
</body>
</html>
