<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retrostrap splash</title>
<link rel="stylesheet" href="/dist/retrostrap.css">
</head>
<body>
<div class="rs-page rs-container">
  <h1 id="behind">The page behind the splash</h1>
  <p>If you can read this without dismissing anything, progressive enhancement worked.</p>
</div>

<div class="rs-splash" id="splash" hidden aria-label="Welcome">
  <div class="rs-center">
    <h1 class="rs-font-7">ENTER</h1>
    <button class="rs-btn rs-splash__enter" id="splash-enter">[ enter site ]</button>
  </div>
</div>

<script src="/dist/retrostrap.js"></script>
</body>
</html>
