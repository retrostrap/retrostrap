<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- the canvas renders imported/untrusted block HTML; block any external load or beacon it might carry -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>canvas</title>
<link rel="stylesheet" href="../../dist/retrostrap.min.css">
<link rel="stylesheet" href="../../dist/retrostrap-patterns.css">
<link id="bx-theme" rel="stylesheet" href="">
<style>
  /* the editing affordances, namespaced bx-, and gone in preview/export */
  html { min-block-size: 100%; }
  body { margin: 0; min-block-size: 100vh; }
  #bx-root { min-block-size: 60vh; }

  .bx-empty { margin: 40px auto; max-inline-size: 30em; padding: 24px;
    border: 2px dashed #808080; text-align: center; color: #666666;
    font-family: Tahoma, sans-serif; }

  .bx-block { position: relative; outline: 1px dashed transparent; outline-offset: 2px; }
  .bx-block:hover { outline-color: #808080; }
  .bx-block.bx-selected { outline: 2px solid #000080; }
  .bx-block > [contenteditable]:focus { outline: 2px solid #3399FF; outline-offset: 2px; }

  .bx-bar { position: absolute; inset-block-start: -2px; inset-inline-end: -2px; z-index: 9;
    display: none; gap: 1px; background: #000080; padding: 1px; }
  .bx-block:hover > .bx-bar,
  .bx-block:focus-within > .bx-bar,
  .bx-block.bx-selected > .bx-bar { display: flex; }
  .bx-bar button { min-inline-size: 20px; block-size: 18px; padding: 0 3px;
    font: 11px/1 "Courier New", monospace; color: #000000; background: #C0C0C0;
    border: 1px solid #FFFFFF; border-inline-end-color: #808080; border-block-end-color: #808080;
    cursor: pointer; }
  .bx-bar button:hover { background: #FFFFFF; }

  .bx-drop { block-size: 0; margin: 0; border-block-start: 3px solid #FF00CC; }

  body.bx-preview .bx-block { outline: none !important; }
  body.bx-preview .bx-bar { display: none !important; }
</style>
</head>
<body>
<div class="rs-page rs-container" id="bx-root"></div>

<script src="../../dist/retrostrap.min.js"></script>
<script src="../../dist/retrostrap-toybox.min.js"></script>
<script src="canvas.js"></script>
</body>
</html>
