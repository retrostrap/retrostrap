name: Bug report
description: Something renders wrong, breaks, or betrays the laws
title: "[bug] "
labels: [bug, triage]
body:
  - type: input
    id: version
    attributes:
      label: Retrostrap version
      placeholder: "0.2.1, see the dist/retrostrap.css header or manifest.json"
    validations: { required: true }
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Firefox 143 / Safari 26.2 / ..."
    validations: { required: true }
  - type: dropdown
    id: theme
    attributes:
      label: Theme in use
      options: ["base (no theme)", "a bundled theme (name it in the steps)", "custom theme"]
    validations: { required: true }
  - type: input
    id: widget
    attributes:
      label: Component or widget involved
      placeholder: "rs-error-page, a widget, a pattern..."
  - type: dropdown
    id: reduced-motion
    attributes:
      label: Is prefers-reduced-motion set?
      options: ["no", "yes (reduce)", "unsure"]
    validations: { required: true }
  - type: dropdown
    id: no-js
    attributes:
      label: Does it happen with JavaScript disabled?
      options: ["yes", "no", "not tried", "n/a, CSS only"]
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Smallest possible HTML snippet or link, plus expected vs. actual.
      render: html
    validations: { required: true }
